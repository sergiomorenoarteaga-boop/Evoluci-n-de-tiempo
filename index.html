<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edad de Piedra</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui-top {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            padding: 10px 18px;
            border-radius: 12px;
            color: white;
            backdrop-filter: blur(5px);
            z-index: 10;
            border-left: 4px solid #d4a017;
        }
        #resources { font-size: 18px; font-weight: bold; margin-bottom: 4px; display: flex; flex-wrap: wrap; gap: 12px; }
        #constructions-info, #population-info { font-size: 14px; }
        .roles-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 170px;
            background: rgba(0,0,0,0.85);
            border-radius: 16px;
            padding: 12px;
            color: white;
            border: 1px solid #d4a017;
            z-index: 20;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }
        .role-card {
            background: #2c2c2c;
            margin: 6px 0;
            padding: 6px 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: grab;
            border: 1px solid #555;
        }
        .role-card:active { cursor: grabbing; }
        .role-icon { font-size: 24px; }
        .role-name { font-size: 13px; font-weight: bold; }
        .role-desc { font-size: 9px; color: #ccc; }
        .btn-fire {
            margin-top: 10px;
            background: #8b3a0f;
            border: 1px solid #ff8833;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        .characters-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
            min-width: 120px;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            color: white;
        }
        #notification-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .toast {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            border-left: 4px solid #d4a017;
            font-size: 14px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        @media (max-width: 700px) {
            .roles-panel { width: 130px; padding: 8px; right: 5px; top: 10px; }
            .characters-status { font-size: 10px; max-height: 120px; }
            #resources { font-size: 14px; gap: 6px; }
        }
    </style>
</head>
<body>
    <div id="ui-top">
        <div id="resources">
            <span>🌲 Madera: <span id="wood">0</span></span>
            <span>🪨 Piedra: <span id="stone">0</span></span>
            <span>🍓 Comida: <span id="food">20</span></span>
        </div>
        <div id="constructions-info">🏠 Cabañas: <span id="huts">0</span> &nbsp;| 🔥 Fogatas: <span id="fires">0</span></div>
        <div id="population-info">👥 Población: <span id="pop-count">3</span></div>
    </div>

    <div class="roles-panel" id="roles-panel">
        <h3>📦 Arrastra un rol</h3>
        <div class="role-card" draggable="true" data-role="lumberjack"><div class="role-icon">🌲</div><div><div class="role-name">Leñador</div><div class="role-desc">Corta árboles</div></div></div>
        <div class="role-card" draggable="true" data-role="miner"><div class="role-icon">⛏️</div><div><div class="role-name">Minero</div><div class="role-desc">Mineral + piedra</div></div></div>
        <div class="role-card" draggable="true" data-role="builder"><div class="role-icon">🏠</div><div><div class="role-name">Constructor</div><div class="role-desc">Construye cabañas</div></div></div>
        <div class="role-card" draggable="true" data-role="gatherer"><div class="role-icon">🍓</div><div><div class="role-name">Recolector</div><div class="role-desc">Recoge bayas</div></div></div>
        <button class="btn-fire" id="btn-build-fire">🔥 Construir Fogata (8M/4P)</button>
    </div>

    <div class="characters-status" id="char-status">
        <strong>🧑 Miembros:</strong>
        <div id="character-list"></div>
    </div>
    <div id="notification-container"></div>
    <div class="instruction">🖱️ Arrastra rol sobre personaje. 🎮 Mueve al Jefe con WASD.</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
